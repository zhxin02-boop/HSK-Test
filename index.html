<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HSK 测试挑战</title>
<script src="https://unpkg.com/mqtt@5.3.5/dist/mqtt.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF7;--card:#fff;--accent:#E8563A;--accent-light:#FFF0EC;--green:#22c55e;--green-light:#f0fdf4;--red:#ef4444;--red-light:#fef2f2;--text:#1a1a1a;--text2:#666;--border:#e5e5e5;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Mode Selection ── */
.mode-select{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px}
.mode-select h1{font-size:28px;font-weight:700;color:var(--accent)}
.mode-select p{color:var(--text2);font-size:15px;margin-bottom:10px}
.mode-btn{width:260px;padding:18px;border:2px solid var(--border);border-radius:var(--radius);background:var(--card);font-size:17px;font-weight:600;cursor:pointer;transition:all .2s}
.mode-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.mode-btn span{font-size:13px;font-weight:400;color:var(--text2);display:block;margin-top:4px}

/* ── Common Header ── */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;color:var(--accent);font-weight:700}
.header .status{font-size:12px;color:var(--text2)}
.header .status .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;background:#ccc}
.header .status .dot.on{background:var(--green)}
.back-btn{background:none;border:none;font-size:14px;color:var(--accent);cursor:pointer;padding:4px 8px}

/* ══════════════════════════════ */
/* ────── TEACHER VIEW ────────  */
/* ══════════════════════════════ */
.teacher-wrap{display:flex;height:calc(100vh - 49px)}
.t-sidebar{width:280px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.t-main{flex:1;overflow-y:auto;padding:20px}

/* Sidebar sections */
.t-section-title{padding:12px 16px 6px;font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;border-top:1px solid var(--border)}
.t-section-title:first-child{border-top:none}
.t-part-title{padding:4px 16px;font-size:12px;color:var(--text2);font-weight:600}
.t-q-list{display:flex;flex-wrap:wrap;gap:4px;padding:4px 16px 10px}
.t-q-btn{width:36px;height:32px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.t-q-btn:hover{border-color:var(--accent);color:var(--accent)}
.t-q-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.t-q-btn.done{background:var(--green-light);border-color:var(--green);color:var(--green)}

/* Teacher main panel */
.t-question-card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid var(--border);margin-bottom:16px}
.t-question-card .q-label{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:8px}
.t-question-card .q-type{font-size:11px;color:var(--text2);background:#f5f5f5;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:12px}
.t-question-card .q-body{font-size:18px;line-height:1.6;margin-bottom:16px;white-space:pre-line}
.t-question-card .q-options{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.t-question-card .q-opt{padding:8px 12px;background:#f9f9f9;border-radius:8px;font-size:15px}
.t-question-card .q-opt.correct{background:var(--green-light);color:#166534;font-weight:600}
.t-question-card .q-answer{font-size:15px;color:var(--green);font-weight:600;padding:8px 12px;background:var(--green-light);border-radius:8px;display:none}

.t-actions{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.t-btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.t-btn-push{background:var(--accent);color:#fff}
.t-btn-push:hover{opacity:.9}
.t-btn-push:disabled{background:#ccc;cursor:not-allowed}
.t-btn-reveal{background:#2563eb;color:#fff}
.t-btn-close{background:#6b7280;color:#fff}
.t-btn-nav{background:var(--card);border:1px solid var(--border);color:var(--text)}
.t-btn-nav:hover{border-color:var(--accent)}

/* Live answers dashboard */
.t-dashboard{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border)}
.t-dashboard h3{font-size:14px;color:var(--text2);margin-bottom:12px}
.t-stats{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.t-stat{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600}
.t-stat.total{background:#f0f0ff;color:#4338ca}
.t-stat.correct{background:var(--green-light);color:#166534}
.t-stat.wrong{background:var(--red-light);color:#991b1b}

.t-answers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.t-answer-cell{padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between;align-items:center}
.t-answer-cell .name{font-weight:600;font-size:12px}
.t-answer-cell .ans{font-weight:700;font-size:15px}
.t-answer-cell.c{background:var(--green-light);border-color:var(--green)}
.t-answer-cell.w{background:var(--red-light);border-color:var(--red)}
.t-answer-cell.pending{background:#fefce8;border-color:#eab308}

/* ══════════════════════════════ */
/* ────── STUDENT VIEW ────────  */
/* ══════════════════════════════ */
.s-wrap{padding:16px;max-width:500px;margin:0 auto}

/* Name select */
.s-name-section{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.s-name-section label{font-size:14px;font-weight:600;display:block;margin-bottom:8px}
.s-name-select{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:16px;background:var(--card);appearance:none}
.s-name-confirmed{display:flex;align-items:center;justify-content:space-between}
.s-name-confirmed .name{font-size:18px;font-weight:700;color:var(--accent)}
.s-name-confirmed button{font-size:12px;color:var(--text2);border:1px solid var(--border);background:none;padding:4px 10px;border-radius:6px;cursor:pointer}

/* Waiting */
.s-waiting{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px}
.s-waiting .icon{font-size:48px;margin-bottom:16px}
.s-waiting .pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Question display */
.s-question{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.s-question .q-num{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:4px}
.s-question .q-instruction{font-size:12px;color:var(--text2);margin-bottom:12px}
.s-question .q-body{font-size:17px;line-height:1.7;margin-bottom:16px;white-space:pre-line}

/* Answer buttons */
.s-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.s-opt-btn{padding:14px 16px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:16px;text-align:left;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.s-opt-btn:active{transform:scale(.98)}
.s-opt-btn .letter{font-weight:700;color:var(--accent);min-width:24px}
.s-opt-btn.selected{border-color:var(--accent);background:var(--accent-light)}
.s-opt-btn.correct-reveal{border-color:var(--green);background:var(--green-light)}
.s-opt-btn.wrong-reveal{border-color:var(--red);background:var(--red-light)}
.s-opt-btn:disabled{cursor:default;opacity:.9}

/* TF buttons */
.s-tf-btns{display:flex;gap:12px;margin-bottom:16px}
.s-tf-btn{flex:1;padding:18px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:24px;cursor:pointer;transition:all .15s;text-align:center}
.s-tf-btn.selected{border-color:var(--accent);background:var(--accent-light)}
.s-tf-btn.correct-reveal{border-color:var(--green);background:var(--green-light)}
.s-tf-btn.wrong-reveal{border-color:var(--red);background:var(--red-light)}

/* Text input */
.s-text-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:10px;font-size:17px;margin-bottom:12px;transition:border-color .2s}
.s-text-input:focus{outline:none;border-color:var(--accent)}
.s-submit-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.s-submit-btn:disabled{background:#ccc;cursor:not-allowed}

/* Result feedback */
.s-result{text-align:center;padding:16px;border-radius:10px;font-size:16px;font-weight:600;margin-top:12px}
.s-result.correct{background:var(--green-light);color:#166534}
.s-result.wrong{background:var(--red-light);color:#991b1b}

/* Score bar */
.s-score-bar{background:var(--card);border-radius:var(--radius);padding:14px 20px;border:1px solid var(--border);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.s-score-bar .score{font-size:22px;font-weight:700;color:var(--accent)}

/* Responsive */
@media(max-width:768px){
  .teacher-wrap{flex-direction:column}
  .t-sidebar{width:100%;max-height:40vh;border-right:none;border-bottom:1px solid var(--border)}
  .t-main{padding:12px}
}
</style>
</head>
<body>

<!-- ═══ MODE SELECTION ═══ -->
<div class="mode-select" id="modeSelect">
  <h1>📝 HSK 测试挑战</h1>
  <p>HSK三级真题 · H31110</p>
  <button class="mode-btn" onclick="enterMode('teacher')">
    🖥️ 教师端
    <span>控制出题 · 查看答题情况</span>
  </button>
  <button class="mode-btn" onclick="enterMode('student')">
    📱 学生端
    <span>答题 · 查看成绩</span>
  </button>
</div>

<!-- ═══ TEACHER VIEW ═══ -->
<div id="teacherView" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <h1>HSK 测试挑战 · 教师端</h1>
    <div class="status"><span class="dot" id="tDot"></span><span id="tStatus">连接中...</span></div>
  </div>
  <div class="teacher-wrap">
    <div class="t-sidebar" id="tSidebar"></div>
    <div class="t-main" id="tMain">
      <div style="text-align:center;color:var(--text2);padding:60px">
        <p style="font-size:48px;margin-bottom:16px">👈</p>
        <p>从左侧选择题目开始</p>
      </div>
    </div>
  </div>
</div>

<!-- ═══ STUDENT VIEW ═══ -->
<div id="studentView" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <h1>HSK 测试挑战</h1>
    <div class="status"><span class="dot" id="sDot"></span><span id="sStatus">连接中...</span></div>
  </div>
  <div class="s-wrap">
    <!-- Name -->
    <div class="s-name-section" id="sNameSection">
      <div id="sNameSelectArea">
        <label>👤 选择你的名字</label>
        <select class="s-name-select" id="sNameSelect" onchange="confirmStudentName()">
          <option value="">请选择...</option>
        </select>
      </div>
      <div id="sNameConfirmed" style="display:none">
        <div class="s-name-confirmed">
          <span class="name">👤 <span id="sConfirmedName"></span></span>
          <button onclick="changeStudentName()">切换</button>
        </div>
      </div>
    </div>
    <!-- Score -->
    <div class="s-score-bar">
      <span>🎯 得分</span>
      <span class="score" id="sScore">0</span>
    </div>
    <!-- Question area -->
    <div id="sQuestionArea">
      <div class="s-waiting">
        <div class="icon pulse">📡</div>
        <p>等待老师出题...</p>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const MQTT_URL = 'wss://05d1d5baec9d4cb3a21f5517b430cff1.s1.eu.hivemq.cloud:8884/mqtt';
const MQTT_USER = 'classpro';
const MQTT_PASS = 'Classpro2026';
const ROOM = '8888';
const TOPIC_QUESTION = `classpro/room/${ROOM}/hsk/question`;
const TOPIC_SUBMIT   = `classpro/room/${ROOM}/hsk/submit`;
const TOPIC_REVEAL   = `classpro/room/${ROOM}/hsk/reveal`;
const TOPIC_CLOSE    = `classpro/room/${ROOM}/hsk/close`;

const STUDENTS = [
  "Jin jilin 金继林","Andrew","Rui xiang 瑞翔","Jin rui 金瑞",
  "Mo tong 墨桐","Qiaodan 巧丹","Jialin 嘉林","Yue xin 悦心",
  "Xin yu 心语","Luni make 鲁尼马克","Vincent","Musa 穆萨",
  "Eifa","Wan er 婉儿","Hongyu 宏宇","Luzian 鲁子安","Issa","Yazan"
];

// ═══════════════════════════════════
// QUESTION DATA (H31110)
// ═══════════════════════════════════
const ALL_QUESTIONS = [];
const Q_MAP = {};

// Helper to register questions
function addQ(id, section, part, type, data) {
  const q = { id, section, part, type, ...data };
  ALL_QUESTIONS.push(q);
  Q_MAP[id] = q;
}

// ── 听力 第一部分 (1-10) 看图选择 ──
const pic1 = {A:"一个男人在看鞋子和包",B:"一个女孩抱着一只小狗",C:"一个男人在搬箱子",D:"一个男人在打电话",E:"一个男人抱着纸箱搬东西",F:"一男一女在户外看地图"};
[{id:1,a:"B"},{id:2,a:"C"},{id:3,a:"E"},{id:4,a:"F"},{id:5,a:"A"}].forEach(q=>
  addQ(q.id,"听力","第一部分","choice",{instruction:"听录音，选择与录音内容一致的图片。",options:Object.entries(pic1).map(([k,v])=>k+". "+v),optionKeys:Object.keys(pic1),answer:q.a}));
const pic2 = {A:"一男一女在跳舞",B:"一对情侣，男的在送礼物",C:"一个穿西装的人走下楼梯",D:"一男一女在握手",E:"一个人在电脑前很烦恼"};
[{id:6,a:"C"},{id:7,a:"A"},{id:8,a:"B"},{id:9,a:"E"},{id:10,a:"D"}].forEach(q=>
  addQ(q.id,"听力","第一部分","choice",{instruction:"听录音，选择与录音内容一致的图片。",options:Object.entries(pic2).map(([k,v])=>k+". "+v),optionKeys:Object.keys(pic2),answer:q.a}));

// ── 听力 第二部分 (11-20) 判断对错 ──
[
  {id:11,s:"老张要去机场接孩子。",a:false},
  {id:12,s:"他10年前去过那儿。",a:true},
  {id:13,s:"包里有校长的护照。",a:true},
  {id:14,s:"李先生做的饭很好吃。",a:false},
  {id:15,s:"她那天哭了。",a:true},
  {id:16,s:"他想学跳舞。",a:false},

  {id:20,s:"低年级学生喜欢边玩儿边学。",a:true}
].forEach(q=>addQ(q.id,"听力","第二部分","true_false",{instruction:"听录音，判断对不对。",statement:q.s,answer:q.a}));

// ── 听力 第三部分 (21-30) ──
[
  {id:21,o:["在找椅子","同意看电影","喜欢听音乐"],a:"B"},
  {id:22,o:["公司离家近","要照顾妹妹","小猫生病了"],a:"A"},
  {id:23,o:["公园","商店","洗手间"],a:"C"},
  {id:24,o:["节目","节日","菜单"],a:"A"},
  {id:25,o:["很胖","很瘦","很矮"],a:"A"},
  {id:26,o:["叔叔","爸爸","丈夫"],a:"C"},
  {id:27,o:["宾馆附近","银行旁边","篮球场东边"],a:"B"},
  {id:28,o:["正在复习","爱好爬山","写完作业了"],a:"C"},
  {id:29,o:["糖","茶","牛奶"],a:"A"},
  {id:30,o:["先工作","自己决定","认真学习"],a:"B"}
].forEach(q=>{
  const keys=["A","B","C"];
  addQ(q.id,"听力","第三部分","choice",{instruction:"听对话和问题，选择正确答案。",options:q.o.map((t,i)=>keys[i]+". "+t),optionKeys:keys,answer:q.a});
});

// ── 听力 第四部分 (31-40) ──
[
  {id:31,o:["朋友","司机","赵先生"],a:"A"},
  {id:32,o:["同事","老师和学生","妈妈和儿子"],a:"C"},
  {id:33,o:["楼下","河边","游泳馆"],a:"A"},
  {id:34,o:["星期四","下个月","明年夏天"],a:"B"},
  {id:35,o:["特别差","很一般","非常好"],a:"B"},
  {id:36,o:["西瓜","香蕉","葡萄"],a:"C"},
  {id:37,o:["听同学讲的","书上看到的","报纸上看到的"],a:"B"},
  {id:38,o:["口渴了","风太大","腿不舒服"],a:"B"},
  {id:39,o:["发烧了","很难过","比较忙"],a:"C"},
  {id:40,o:["关灯","还书","买字典"],a:"A"}

});

// ── 阅读 第一部分 (41-50) 句子匹配 ──

[
  {id:41,p:"别客气，还要米饭吗？厨房里还有。",a:"A"},

const match2Opts = {A:"你的脚怎么样了？",B:"打扫完了？饿坏了吧？",C:"没关系，你第一次用这个相机，下次就好了。",D:"你怎么突然决定要离开？",E:"好的，马上就来。"};
[
  {id:46,p:"服务员，请给我再拿一个盘子和一杯果汁。",a:"E"},
  {id:47,p:"奇怪，周末在动物园照的很多照片都不太清楚。",a:"C"},

  {id:50,p:"谢谢您的关心，现在跑步没问题了。",a:"A"}
].forEach(q=>addQ(q.id,"阅读","第一部分","choice",{instruction:"选择正确答案。",body:q.p,options:Object.entries(match2Opts).map(([k,v])=>k+". "+v),optionKeys:Object.keys(match2Opts),answer:q.a}));

// ── 阅读 第二部分 (51-60) 选词填空 ──
const fill1Opts = {A:"重要",B:"还是",C:"空调",D:"习惯",E:"声音",F:"辆"};
[

// ═══════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════
let mode = null; // 'teacher' | 'student'
let client = null;
let connected = false;

// Teacher state
let currentQId = null;
let questionPushed = false;
let answerRevealed = false;
let submissions = {}; // { studentName: { answer, time } }
let doneQuestions = new Set();

// Student state
let studentName = localStorage.getItem('hsk_student_name') || '';
let studentScore = parseInt(localStorage.getItem('hsk_student_score') || '0');
let activeQuestion = null;
let myAnswer = null;
let answerLocked = false;
let studentDone = JSON.parse(localStorage.getItem('hsk_student_done') || '{}'); // {qId: {answer, correct}}

// ═══════════════════════════════════
// MQTT
// ═══════════════════════════════════
function connectMQTT() {
  client = mqtt.connect(MQTT_URL, {
    username: MQTT_USER,
    password: MQTT_PASS,
    clientId: 'hsk_' + mode + '_' + Math.random().toString(36).substr(2, 6),
    reconnectPeriod: 3000,
    clean: true
  });

  client.on('connect', () => {
    connected = true;
    updateStatus(true);
    if (mode === 'teacher') {
      client.subscribe(TOPIC_SUBMIT, { qos: 1 });
    } else {
      client.subscribe(TOPIC_QUESTION, { qos: 1 });
      client.subscribe(TOPIC_REVEAL, { qos: 1 });
      client.subscribe(TOPIC_CLOSE, { qos: 1 });
    }
  });

  client.on('message', (topic, payload) => {
    let data;
    try { data = JSON.parse(payload.toString()); } catch(e) { return; }

    if (mode === 'teacher' && topic === TOPIC_SUBMIT) {
      onTeacherReceiveSubmission(data);
    }
    if (mode === 'student') {
      if (topic === TOPIC_QUESTION) onStudentReceiveQuestion(data);
      if (topic === TOPIC_REVEAL) onStudentReceiveReveal(data);
      if (topic === TOPIC_CLOSE) onStudentReceiveClose(data);
    }
  });

  client.on('offline', () => { connected = false; updateStatus(false); });
  client.on('error', () => { connected = false; updateStatus(false); });
}

function updateStatus(on) {
  const dotId = mode === 'teacher' ? 'tDot' : 'sDot';
  const txtId = mode === 'teacher' ? 'tStatus' : 'sStatus';
  const dot = document.getElementById(dotId);
  const txt = document.getElementById(txtId);
  if (dot) dot.className = 'dot' + (on ? ' on' : '');
  if (txt) txt.textContent = on ? '已连接' : '连接中...';
}

// ═══════════════════════════════════
// MODE ENTRY
// ═══════════════════════════════════
function enterMode(m) {
  mode = m;
  document.getElementById('modeSelect').style.display = 'none';
  if (m === 'teacher') {
    document.getElementById('teacherView').style.display = '';
    buildTeacherSidebar();
  } else {
    document.getElementById('studentView').style.display = '';
    buildStudentNameList();
    if (studentName) restoreStudentName();
    document.getElementById('sScore').textContent = studentScore;
  }
  connectMQTT();
}

function goBack() {
  if (client) client.end();
  mode = null;
  document.getElementById('teacherView').style.display = 'none';
  document.getElementById('studentView').style.display = 'none';
  document.getElementById('modeSelect').style.display = '';
}

// ═══════════════════════════════════
// TEACHER: SIDEBAR
// ═══════════════════════════════════
function buildTeacherSidebar() {
  const sb = document.getElementById('tSidebar');
  const sections = {};
  ALL_QUESTIONS.forEach(q => {
    if (!sections[q.section]) sections[q.section] = {};
    if (!sections[q.section][q.part]) sections[q.section][q.part] = [];
    sections[q.section][q.part].push(q);
  });

  let html = '';
  for (const [sec, parts] of Object.entries(sections)) {
    html += `<div class="t-section-title">${sec}</div>`;
    for (const [part, qs] of Object.entries(parts)) {
      html += `<div class="t-part-title">${part}</div><div class="t-q-list">`;
      qs.forEach(q => {
        html += `<button class="t-q-btn" id="tqb_${q.id}" onclick="teacherSelectQ(${q.id})">${q.id}</button>`;
      });
      html += '</div>';
    }
  }
  sb.innerHTML = html;
}

// ═══════════════════════════════════
// TEACHER: SELECT & PUSH QUESTION
// ═══════════════════════════════════
function teacherSelectQ(qId) {
  currentQId = qId;
  questionPushed = false;
  answerRevealed = false;
  submissions = {};

  // Highlight sidebar button
  document.querySelectorAll('.t-q-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tqb_' + qId);
  if (btn) btn.classList.add('active');

  renderTeacherMain();
}

function renderTeacherMain() {
  const q = Q_MAP[currentQId];
  if (!q) return;
  const main = document.getElementById('tMain');

  const typeLabels = { choice: '选择题', true_false: '判断对错', text_input: '书写题' };
  const answerDisplay = q.type === 'true_false' ? (q.answer ? '√ 对' : '× 错') : q.answer;

  let bodyHtml = '';
  if (q.body) bodyHtml += `<div class="q-body">${escHtml(q.body)}</div>`;
  if (q.statement) bodyHtml += `<div class="q-body">★ ${escHtml(q.statement)}</div>`;

  let optionsHtml = '';
  if (q.options) {
    optionsHtml = '<div class="q-options">';
    q.options.forEach((opt, i) => {
      const key = q.optionKeys ? q.optionKeys[i] : String.fromCharCode(65 + i);
      const isCorrect = answerRevealed && key === q.answer;
      optionsHtml += `<div class="q-opt${isCorrect ? ' correct' : ''}">${escHtml(opt)}</div>`;
    });
    optionsHtml += '</div>';
  }

  main.innerHTML = `
    <div class="t-question-card">
      <div class="q-label">第 ${q.id} 题</div>
      <div class="q-type">${q.section} · ${q.part} · ${typeLabels[q.type] || q.type}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">${escHtml(q.instruction || '')}</div>
      ${bodyHtml}
      ${optionsHtml}
      <div class="q-answer" id="tAnswer" style="${answerRevealed ? 'display:block' : ''}">✅ 正确答案：${escHtml(String(answerDisplay))}</div>
    </div>
    <div class="t-actions">
      <button class="t-btn t-btn-push" id="btnPush" onclick="pushQuestion()" ${questionPushed ? 'disabled' : ''}>
        ${questionPushed ? '✅ 已推送' : '📤 推送给学生'}
      </button>
      <button class="t-btn t-btn-reveal" onclick="revealAnswer()" ${!questionPushed || answerRevealed ? 'style="display:none"' : ''}>
        📊 公布答案
      </button>
      <button class="t-btn t-btn-close" onclick="closeQuestion()" ${!questionPushed ? 'style="display:none"' : ''}>
        🔒 关闭此题
      </button>
      <button class="t-btn t-btn-nav" onclick="goNextQ(-1)">← 上一题</button>
      <button class="t-btn t-btn-nav" onclick="goNextQ(1)">下一题 →</button>
    </div>
    <div class="t-dashboard" id="tDashboard">
      <h3>📊 答题情况 <span style="font-weight:400;font-size:12px">(${Object.keys(submissions).length}/${STUDENTS.length} 人已交)</span></h3>
      <div class="t-stats" id="tStats"></div>
      <div class="t-answers-grid" id="tAnswersGrid"></div>
    </div>
  `;
  renderDashboard();
}

function pushQuestion() {
  if (!currentQId || !connected) return;
  questionPushed = true;
  submissions = {};
  const q = Q_MAP[currentQId];
  client.publish(TOPIC_QUESTION, JSON.stringify({
    id: q.id, section: q.section, part: q.part, type: q.type,
    instruction: q.instruction, body: q.body || null,
    statement: q.statement || null,
    options: q.options || null, optionKeys: q.optionKeys || null
  }), { qos: 1, retain: true });
  renderTeacherMain();
}

function revealAnswer() {
  if (!currentQId) return;
  answerRevealed = true;
  const q = Q_MAP[currentQId];
  doneQuestions.add(currentQId);
  const btn = document.getElementById('tqb_' + currentQId);
  if (btn) btn.classList.add('done');
  client.publish(TOPIC_REVEAL, JSON.stringify({ id: q.id, answer: q.answer }), { qos: 1 });
  renderTeacherMain();
}

function closeQuestion() {
  client.publish(TOPIC_CLOSE, JSON.stringify({ id: currentQId }), { qos: 1 });
  // Clear retained question
  client.publish(TOPIC_QUESTION, '', { qos: 1, retain: true });
}

function goNextQ(dir) {
  if (!currentQId) return;
  const idx = ALL_QUESTIONS.findIndex(q => q.id === currentQId);
  const next = idx + dir;
  if (next >= 0 && next < ALL_QUESTIONS.length) {
    teacherSelectQ(ALL_QUESTIONS[next].id);
  }
}

// ═══════════════════════════════════
// TEACHER: RECEIVE SUBMISSIONS
// ═══════════════════════════════════
function onTeacherReceiveSubmission(data) {
  if (data.questionId !== currentQId) return;
  submissions[data.name] = { answer: data.answer, time: data.time };
  renderDashboard();
}

function renderDashboard() {
  const grid = document.getElementById('tAnswersGrid');
  const stats = document.getElementById('tStats');
  if (!grid || !stats) return;

  const q = Q_MAP[currentQId];
  let correctCount = 0, wrongCount = 0;

  let gridHtml = '';
  STUDENTS.forEach(name => {
    const sub = submissions[name];
    if (!sub) {
      gridHtml += `<div class="t-answer-cell"><span class="name">${shortName(name)}</span><span class="ans" style="color:#ccc">—</span></div>`;
    } else {
      let cls = '';
      if (answerRevealed) {
        const isCorrect = checkAnswer(q, sub.answer);
        cls = isCorrect ? 'c' : 'w';
        if (isCorrect) correctCount++; else wrongCount++;
      } else {
        cls = 'pending';
      }
      gridHtml += `<div class="t-answer-cell ${cls}"><span class="name">${shortName(name)}</span><span class="ans">${escHtml(String(sub.answer))}</span></div>`;
    }
  });

  const total = Object.keys(submissions).length;
  let statsHtml = `<span class="t-stat total">已交 ${total}/${STUDENTS.length}</span>`;
  if (answerRevealed) {
    statsHtml += `<span class="t-stat correct">✅ ${correctCount}</span>`;
    statsHtml += `<span class="t-stat wrong">❌ ${wrongCount}</span>`;
    const pct = total > 0 ? Math.round(correctCount / total * 100) : 0;
    statsHtml += `<span class="t-stat total">正确率 ${pct}%</span>`;
  }

  stats.innerHTML = statsHtml;
  grid.innerHTML = gridHtml;
  // Update header count
  const h3 = document.querySelector('#tDashboard h3');
  if (h3) h3.innerHTML = `📊 答题情况 <span style="font-weight:400;font-size:12px">(${total}/${STUDENTS.length} 人已交)</span>`;
}

// ═══════════════════════════════════
// STUDENT: NAME
// ═══════════════════════════════════
function buildStudentNameList() {
  const sel = document.getElementById('sNameSelect');
  STUDENTS.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function confirmStudentName() {
  const val = document.getElementById('sNameSelect').value;
  if (!val) return;
  studentName = val;
  localStorage.setItem('hsk_student_name', val);
  document.getElementById('sNameSelectArea').style.display = 'none';
  document.getElementById('sNameConfirmed').style.display = '';
  document.getElementById('sConfirmedName').textContent = val;
}

function restoreStudentName() {
  document.getElementById('sNameSelect').value = studentName;
  confirmStudentName();
}

function changeStudentName() {
  studentName = '';
  localStorage.removeItem('hsk_student_name');
  document.getElementById('sNameSelectArea').style.display = '';
  document.getElementById('sNameConfirmed').style.display = 'none';
}

// ═══════════════════════════════════
// STUDENT: RECEIVE QUESTION
// ═══════════════════════════════════
function onStudentReceiveQuestion(data) {
  if (!data || !data.id) return;
  activeQuestion = data;
  myAnswer = null;
  answerLocked = false;
  renderStudentQuestion();
}

function onStudentReceiveReveal(data) {
  if (!activeQuestion || data.id !== activeQuestion.id) return;
  answerLocked = true;
  const q = Q_MAP[data.id];
  const isCorrect = myAnswer !== null && checkAnswer(q, myAnswer);

  // Save result
  if (myAnswer !== null) {
    if (isCorrect) {
      studentScore++;
      localStorage.setItem('hsk_student_score', studentScore);
      document.getElementById('sScore').textContent = studentScore;
    }
    studentDone[data.id] = { answer: myAnswer, correct: isCorrect };
    localStorage.setItem('hsk_student_done', JSON.stringify(studentDone));
  }

  renderStudentReveal(data.answer, isCorrect);
}

function onStudentReceiveClose(data) {
  activeQuestion = null;
  myAnswer = null;
  answerLocked = false;
  document.getElementById('sQuestionArea').innerHTML = `
    <div class="s-waiting">
      <div class="icon pulse">📡</div>
      <p>等待老师出题...</p>
    </div>`;
}

// ═══════════════════════════════════
// STUDENT: RENDER QUESTION
// ═══════════════════════════════════
function renderStudentQuestion() {
  const q = activeQuestion;
  if (!q) return;
  const area = document.getElementById('sQuestionArea');

  let bodyHtml = '';
  if (q.body) bodyHtml = `<div class="q-body">${escHtml(q.body)}</div>`;
  if (q.statement) bodyHtml = `<div class="q-body">★ ${escHtml(q.statement)}</div>`;

  let inputHtml = '';

  if (q.type === 'choice') {
    inputHtml = '<div class="s-options">';
    q.options.forEach((opt, i) => {
      const key = q.optionKeys ? q.optionKeys[i] : String.fromCharCode(65 + i);
      inputHtml += `<button class="s-opt-btn" id="sopt_${key}" onclick="studentSelectOption('${key}')" ${answerLocked ? 'disabled' : ''}>
        <span class="letter">${key}</span><span>${escHtml(opt.replace(/^[A-F]\.\s*/, ''))}</span>
      </button>`;
    });
    inputHtml += '</div>';
  } else if (q.type === 'true_false') {
    inputHtml = `<div class="s-tf-btns">
      <button class="s-tf-btn" id="sopt_true" onclick="studentSelectTF(true)" ${answerLocked ? 'disabled' : ''}>✓ 对</button>
      <button class="s-tf-btn" id="sopt_false" onclick="studentSelectTF(false)" ${answerLocked ? 'disabled' : ''}>✗ 错</button>
    </div>`;
  } else if (q.type === 'text_input') {
    inputHtml = `<input class="s-text-input" id="sTextInput" placeholder="输入你的答案..." ${answerLocked ? 'disabled' : ''}>
      <button class="s-submit-btn" id="sSubmitText" onclick="studentSubmitText()" ${answerLocked ? 'disabled' : ''}>提交</button>`;
  }

  area.innerHTML = `
    <div class="s-question">
      <div class="q-num">第 ${q.id} 题 · ${q.section} ${q.part}</div>
      <div class="q-instruction">${escHtml(q.instruction || '')}</div>
      ${bodyHtml}
      ${inputHtml}
      <div id="sResult"></div>
    </div>`;
}

function studentSelectOption(key) {
  if (answerLocked || !studentName) return;
  myAnswer = key;
  document.querySelectorAll('.s-opt-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('sopt_' + key);
  if (btn) btn.classList.add('selected');
  submitStudentAnswer(key);
}

function studentSelectTF(val) {
  if (answerLocked || !studentName) return;
  myAnswer = val;
  document.querySelectorAll('.s-tf-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('sopt_' + val);
  if (btn) btn.classList.add('selected');
  submitStudentAnswer(val);
}

function studentSubmitText() {
  if (answerLocked || !studentName) return;
  const input = document.getElementById('sTextInput');
  if (!input || !input.value.trim()) return;
  myAnswer = input.value.trim();
  input.disabled = true;
  document.getElementById('sSubmitText').disabled = true;
  submitStudentAnswer(myAnswer);
}

function submitStudentAnswer(answer) {
  if (!connected || !activeQuestion) return;
  client.publish(TOPIC_SUBMIT, JSON.stringify({
    name: studentName,
    questionId: activeQuestion.id,
    answer: answer,
    time: new Date().toISOString()
  }), { qos: 1 });
}

// ═══════════════════════════════════
// STUDENT: REVEAL RESULT
// ═══════════════════════════════════
function renderStudentReveal(correctAnswer, isCorrect) {
  const q = activeQuestion;
  if (!q) return;

  // Highlight correct/wrong options
  if (q.type === 'choice') {
    document.querySelectorAll('.s-opt-btn').forEach(b => {
      b.disabled = true;
      const key = b.id.replace('sopt_', '');
      if (key === correctAnswer) b.classList.add('correct-reveal');
      else if (key === myAnswer && key !== correctAnswer) b.classList.add('wrong-reveal');
    });
  } else if (q.type === 'true_false') {
    document.querySelectorAll('.s-tf-btn').forEach(b => {
      b.disabled = true;
      const val = b.id === 'sopt_true';
      if (val === correctAnswer) b.classList.add('correct-reveal');
      else if (val === myAnswer && val !== correctAnswer) b.classList.add('wrong-reveal');
    });
  }

  // Show result
  const res = document.getElementById('sResult');
  if (res && myAnswer !== null) {
    res.className = 's-result ' + (isCorrect ? 'correct' : 'wrong');
    if (isCorrect) {
      res.textContent = '✅ 回答正确！+1分';
    } else {
      const display = q.type === 'true_false' ? (correctAnswer ? '✓ 对' : '✗ 错') : correctAnswer;
      res.textContent = '❌ 正确答案：' + display;
    }
  } else if (res) {
    res.className = 's-result wrong';
    res.textContent = '⏰ 未作答';
  }
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function checkAnswer(q, answer) {
  if (!q) return false;
  if (q.type === 'true_false') return answer === q.answer;
  if (q.gradeMode === 'auto_char') return String(answer).trim() === String(q.answer).trim();
  if (q.gradeMode === 'manual') return null; // teacher grades
  return String(answer).toUpperCase().trim() === String(q.answer).toUpperCase().trim();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/\n/g, '<br>');
}

function shortName(name) {
  // Show first part before space, or first 6 chars
  const parts = name.split(' ');
  return parts[0].length > 8 ? parts[0].substring(0, 6) + '..' : parts[0];
}

// ═══════════════════════════════════
// URL PARAM AUTO-MODE
// ═══════════════════════════════════
(function() {
  const params = new URLSearchParams(window.location.search);
  const m = params.get('mode');
  if (m === 'teacher' || m === 'student') {
    enterMode(m);
  }
})();
</script>
