<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HSK 测试挑战</title>
<script src="https://unpkg.com/mqtt@5.3.5/dist/mqtt.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF7;--card:#fff;--accent:#E8563A;--accent-light:#FFF0EC;--green:#22c55e;--green-light:#f0fdf4;--red:#ef4444;--red-light:#fef2f2;--text:#1a1a1a;--text2:#666;--border:#e5e5e5;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Mode Selection ── */
.mode-select{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px}
.mode-select h1{font-size:28px;font-weight:700;color:var(--accent)}
.mode-select p{color:var(--text2);font-size:15px;margin-bottom:10px}
.mode-btn{width:260px;padding:18px;border:2px solid var(--border);border-radius:var(--radius);background:var(--card);font-size:17px;font-weight:600;cursor:pointer;transition:all .2s}
.mode-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.mode-btn span{font-size:13px;font-weight:400;color:var(--text2);display:block;margin-top:4px}

/* ── Common Header ── */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;color:var(--accent);font-weight:700}
.header .status{font-size:12px;color:var(--text2)}
.header .status .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;background:#ccc}
.header .status .dot.on{background:var(--green)}
.back-btn{background:none;border:none;font-size:14px;color:var(--accent);cursor:pointer;padding:4px 8px}

/* ══════════════════════════════ */
/* ────── TEACHER VIEW ────────  */
/* ══════════════════════════════ */
.teacher-wrap{display:flex;height:calc(100vh - 49px)}
.t-sidebar{width:280px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.t-main{flex:1;overflow-y:auto;padding:20px}

/* Sidebar sections */
.t-section-title{padding:12px 16px 6px;font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;border-top:1px solid var(--border)}
.t-section-title:first-child{border-top:none}
.t-part-title{padding:4px 16px;font-size:12px;color:var(--text2);font-weight:600}
.t-q-list{display:flex;flex-wrap:wrap;gap:4px;padding:4px 16px 10px}
.t-q-btn{width:36px;height:32px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.t-q-btn:hover{border-color:var(--accent);color:var(--accent)}
.t-q-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.t-q-btn.done{background:var(--green-light);border-color:var(--green);color:var(--green)}

/* Teacher main panel */
.t-question-card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid var(--border);margin-bottom:16px}
.t-question-card .q-label{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:8px}
.t-question-card .q-type{font-size:11px;color:var(--text2);background:#f5f5f5;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:12px}
.t-question-card .q-body{font-size:18px;line-height:1.6;margin-bottom:16px;white-space:pre-line}
.t-question-card .q-options{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.t-question-card .q-opt{padding:8px 12px;background:#f9f9f9;border-radius:8px;font-size:15px}
.t-question-card .q-opt.correct{background:var(--green-light);color:#166534;font-weight:600}
.t-question-card .q-answer{font-size:15px;color:var(--green);font-weight:600;padding:8px 12px;background:var(--green-light);border-radius:8px;display:none}

.t-actions{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.t-btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.t-btn-push{background:var(--accent);color:#fff}
.t-btn-push:hover{opacity:.9}
.t-btn-push:disabled{background:#ccc;cursor:not-allowed}
.t-btn-reveal{background:#2563eb;color:#fff}
.t-btn-close{background:#6b7280;color:#fff}
.t-btn-nav{background:var(--card);border:1px solid var(--border);color:var(--text)}
.t-btn-nav:hover{border-color:var(--accent)}

/* Live answers dashboard */
.t-dashboard{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border)}
.t-dashboard h3{font-size:14px;color:var(--text2);margin-bottom:12px}
.t-stats{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.t-stat{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600}
.t-stat.total{background:#f0f0ff;color:#4338ca}
.t-stat.correct{background:var(--green-light);color:#166534}
.t-stat.wrong{background:var(--red-light);color:#991b1b}

.t-answers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.t-answer-cell{padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between;align-items:center}
.t-answer-cell .name{font-weight:600;font-size:12px}
.t-answer-cell .ans{font-weight:700;font-size:15px}
.t-answer-cell.c{background:var(--green-light);border-color:var(--green)}
.t-answer-cell.w{background:var(--red-light);border-color:var(--red)}
.t-answer-cell.pending{background:#fefce8;border-color:#eab308}

/* ══════════════════════════════ */
/* ────── STUDENT VIEW ────────  */
/* ══════════════════════════════ */
.s-wrap{padding:16px;max-width:500px;margin:0 auto}

/* Name select */
.s-name-section{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.s-name-section label{font-size:14px;font-weight:600;display:block;margin-bottom:8px}
.s-name-select{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:16px;background:var(--card);appearance:none}
.s-name-confirmed{display:flex;align-items:center;justify-content:space-between}
.s-name-confirmed .name{font-size:18px;font-weight:700;color:var(--accent)}
.s-name-confirmed button{font-size:12px;color:var(--text2);border:1px solid var(--border);background:none;padding:4px 10px;border-radius:6px;cursor:pointer}

/* Waiting */
.s-waiting{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px}
.s-waiting .icon{font-size:48px;margin-bottom:16px}
.s-waiting .pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Question display */
.s-question{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.s-question .q-num{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:4px}
.s-question .q-instruction{font-size:12px;color:var(--text2);margin-bottom:12px}
.s-question .q-body{font-size:17px;line-height:1.7;margin-bottom:16px;white-space:pre-line}

/* Answer buttons */
.s-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.s-opt-btn{padding:14px 16px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:16px;text-align:left;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.s-opt-btn:active{transform:scale(.98)}
.s-opt-btn .letter{font-weight:700;color:var(--accent);min-width:24px}
.s-opt-btn.selected{border-color:var(--accent);background:var(--accent-light)}
.s-opt-btn.correct-reveal{border-color:var(--green);background:var(--green-light)}
.s-opt-btn.wrong-reveal{border-color:var(--red);background:var(--red-light)}
.s-opt-btn:disabled{cursor:default;opacity:.9}

/* TF buttons */
.s-tf-btns{display:flex;gap:12px;margin-bottom:16px}
.s-tf-btn{flex:1;padding:18px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:24px;cursor:pointer;transition:all .15s;text-align:center}
.s-tf-btn.selected{border-color:var(--accent);background:var(--accent-light)}
.s-tf-btn.correct-reveal{border-color:var(--green);background:var(--green-light)}
.s-tf-btn.wrong-reveal{border-color:var(--red);background:var(--red-light)}

/* Text input */
.s-text-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:10px;font-size:17px;margin-bottom:12px;transition:border-color .2s}
.s-text-input:focus{outline:none;border-color:var(--accent)}
.s-submit-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.s-submit-btn:disabled{background:#ccc;cursor:not-allowed}

/* Result feedback */
.s-result{text-align:center;padding:16px;border-radius:10px;font-size:16px;font-weight:600;margin-top:12px}
.s-result.correct{background:var(--green-light);color:#166534}
.s-result.wrong{background:var(--red-light);color:#991b1b}

/* Score bar */
.s-score-bar{background:var(--card);border-radius:var(--radius);padding:14px 20px;border:1px solid var(--border);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.s-score-bar .score{font-size:22px;font-weight:700;color:var(--accent)}

/* Picture grid for listening Q1-10 */
.s-pic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}

/* Stats overlay */
.stats-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.stats-panel{background:var(--bg);border-radius:16px;max-width:900px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.stats-panel h2{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:16px}
.stats-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--text2)}
.stats-summary{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stats-summary .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;text-align:center;min-width:100px}
.stats-summary .card .num{font-size:24px;font-weight:700;color:var(--accent)}
.stats-summary .card .label{font-size:11px;color:var(--text2);margin-top:2px}
.stats-table{width:100%;border-collapse:collapse;font-size:13px}
.stats-table th{background:var(--card);border:1px solid var(--border);padding:8px 10px;font-weight:700;text-align:center;position:sticky;top:0}
.stats-table td{border:1px solid var(--border);padding:6px 10px;text-align:center}
.stats-table tr:nth-child(even){background:var(--card)}
.stats-table .name-col{text-align:left;font-weight:600;white-space:nowrap}
.stats-table .highlight{background:var(--accent-light);font-weight:700;color:var(--accent)}
.s-pic-btn{border:3px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;padding:6px;text-align:center;transition:all .15s;position:relative;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.s-pic-btn:active{transform:scale(.97)}
.s-pic-btn img{width:100%;height:auto;border-radius:6px;display:block;pointer-events:none}
.s-pic-btn .pic-label{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.6);color:#fff;width:24px;height:24px;border-radius:12px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none}
.s-pic-btn.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.s-pic-btn.correct-reveal{border-color:var(--green);box-shadow:0 0 0 2px var(--green)}
.s-pic-btn.wrong-reveal{border-color:var(--red);box-shadow:0 0 0 2px var(--red)}

.t-pic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.t-pic-cell{text-align:center}
.t-pic-cell img{width:100%;max-width:140px;border-radius:6px}
.t-pic-cell .lbl{font-weight:700;margin-top:4px;font-size:13px}
.t-pic-cell.correct .lbl{color:var(--green)}

/* Responsive */
@media(max-width:768px){
  .teacher-wrap{flex-direction:column}
  .t-sidebar{width:100%;max-height:40vh;border-right:none;border-bottom:1px solid var(--border)}
  .t-main{padding:12px}
}
</style>
</head>
<body>

<!-- ═══ MODE SELECTION ═══ -->
<div class="mode-select" id="modeSelect">
  <h1>📝 HSK 测试挑战</h1>
  <p>HSK三级真题 · H31110</p>
  <button class="mode-btn" onclick="enterMode('teacher')">
    🖥️ 教师端
    <span>控制出题 · 查看答题情况</span>
  </button>
  <button class="mode-btn" onclick="enterMode('student')">
    📱 学生端
    <span>答题 · 查看成绩</span>
  </button>
</div>

<!-- ═══ TEACHER VIEW ═══ -->
<div id="teacherView" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <h1>HSK 测试挑战 · 教师端</h1>
    <div class="status"><span class="dot" id="tDot"></span><span id="tStatus">连接中...</span></div>
  </div>
  <div class="teacher-wrap">
    <div class="t-sidebar" id="tSidebar"></div>
    <div class="t-main" id="tMain">
      <div style="text-align:center;color:var(--text2);padding:60px">
        <p style="font-size:48px;margin-bottom:16px">👈</p>
        <p>从左侧选择题目开始</p>
      </div>
    </div>
  </div>
</div>

<!-- ═══ STUDENT VIEW ═══ -->
<div id="studentView" style="display:none">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <h1>HSK 测试挑战</h1>
    <div class="status"><span class="dot" id="sDot"></span><span id="sStatus">连接中...</span></div>
  </div>
  <div class="s-wrap">
    <!-- Name -->
    <div class="s-name-section" id="sNameSection">
      <div id="sNameSelectArea">
        <label>👤 选择你的名字</label>
        <select class="s-name-select" id="sNameSelect" onchange="confirmStudentName()">
          <option value="">请选择...</option>
        </select>
      </div>
      <div id="sNameConfirmed" style="display:none">
        <div class="s-name-confirmed">
          <span class="name">👤 <span id="sConfirmedName"></span></span>
          <button onclick="changeStudentName()">切换</button>
        </div>
      </div>
    </div>
    <!-- Score -->
    <div class="s-score-bar">
      <span>🎯 得分</span>
      <span class="score" id="sScore">0</span>
    </div>
    <!-- Question area -->
    <div id="sQuestionArea">
      <div class="s-waiting">
        <div class="icon pulse">📡</div>
        <p>等待老师出题...</p>
        <p style="margin-top:16px"><a href="#" onclick="refreshQuestion();return false" style="font-size:13px;color:var(--accent)">收不到题目？点击刷新</a></p>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const MQTT_URL = 'wss://05d1d5baec9d4cb3a21f5517b430cff1.s1.eu.hivemq.cloud:8884/mqtt';
const MQTT_USER = 'classpro';
const MQTT_PASS = 'Classpro2026';
const ROOM = '8888';
const _T = new URLSearchParams(window.location.search).get('test') || 'H31110';
const TOPIC_QUESTION = `classpro/room/${ROOM}/hsk/${_T}/question`;
const TOPIC_SUBMIT   = `classpro/room/${ROOM}/hsk/${_T}/submit`;
const TOPIC_REVEAL   = `classpro/room/${ROOM}/hsk/${_T}/reveal`;
const TOPIC_CLOSE    = `classpro/room/${ROOM}/hsk/${_T}/close`;

const STUDENTS = [
  "Jin jilin 金继林","Andrew","Rui xiang 瑞翔","Jin rui 金瑞",
  "Mo tong 墨桐","Qiaodan 巧丹","Jialin 嘉林","Yue xin 悦心",
  "Xin yu 心语","Luni make 鲁尼马克","Vincent","Musa 穆萨",
  "Eifa","Wan er 婉儿","Hongyu 宏宇","Luzian 鲁子安","Issa","Yazan"
];


// ═══════════════════════════════════
// QUESTION DATA (loaded from external file)
// ═══════════════════════════════════
const ALL_QUESTIONS = [];
const Q_MAP = {};
let TEST_IMAGES = {};

function getImage(q, key) {
  const group = q.imageGroup || 'pic1';
  return TEST_IMAGES[group + '_' + key] || '';
}

function addQ(id, section, part, type, data) {
  const q = { id, section, part, type, ...data };
  ALL_QUESTIONS.push(q);
  Q_MAP[id] = q;
}

function loadTestData() {
  if (!window.HSK_TEST_DATA) return false;
  const d = window.HSK_TEST_DATA;
  TEST_IMAGES = d.images || {};
  d.questions.forEach(q => addQ(q.id, q.section, q.part, q.type, q));
  document.querySelector('.mode-select h1').textContent = '📝 HSK 测试挑战';
  document.querySelector('.mode-select p').textContent = d.level + ' · ' + d.testId;
  return true;
}

// GLOBAL STATE
// ═══════════════════════════════════
let mode = null; // 'teacher' | 'student'
let client = null;
let connected = false;

// Teacher state
let currentQId = null;
let questionPushed = false;
let answerRevealed = false;
let submissions = {}; // { studentName: { answer, time } }
let doneQuestions = new Set();
let currentTestId = new URLSearchParams(window.location.search).get('test') || 'default';
let allSubmissions = JSON.parse(localStorage.getItem('hsk_sub_' + currentTestId) || '{}');

// Student state
let studentName = localStorage.getItem('hsk_student_name') || '';
let studentScore = parseInt(localStorage.getItem('hsk_score_' + (new URLSearchParams(window.location.search).get('test')||'default')) || '0');
let activeQuestion = null;
let myAnswer = null;
let answerLocked = false;
let studentDone = JSON.parse(localStorage.getItem('hsk_student_done') || '{}'); // {qId: {answer, correct}}

// ═══════════════════════════════════
// MQTT
// ═══════════════════════════════════
function connectMQTT() {
  client = mqtt.connect(MQTT_URL, {
    username: MQTT_USER,
    password: MQTT_PASS,
    clientId: 'hsk_' + mode + '_' + Math.random().toString(36).substr(2, 6),
    reconnectPeriod: 3000,
    clean: true
  });

  client.on('connect', () => {
    connected = true;
    updateStatus(true);
    if (mode === 'teacher') {
      client.subscribe(TOPIC_SUBMIT, { qos: 1 });
    } else {
      client.subscribe(TOPIC_QUESTION, { qos: 1 });
      client.subscribe(TOPIC_REVEAL, { qos: 1 });
      client.subscribe(TOPIC_CLOSE, { qos: 1 });
    }
  });

  client.on('message', (topic, payload) => {
    let data;
    try { data = JSON.parse(payload.toString()); } catch(e) { return; }

    if (mode === 'teacher' && topic === TOPIC_SUBMIT) {
      onTeacherReceiveSubmission(data);
    }
    if (mode === 'student') {
      if (topic === TOPIC_QUESTION) onStudentReceiveQuestion(data);
      if (topic === TOPIC_REVEAL) onStudentReceiveReveal(data);
      if (topic === TOPIC_CLOSE) onStudentReceiveClose(data);
    }
  });

  client.on('offline', () => { connected = false; updateStatus(false); });
  client.on('error', () => { connected = false; updateStatus(false); });
}

function updateStatus(on) {
  const dotId = mode === 'teacher' ? 'tDot' : 'sDot';
  const txtId = mode === 'teacher' ? 'tStatus' : 'sStatus';
  const dot = document.getElementById(dotId);
  const txt = document.getElementById(txtId);
  if (dot) dot.className = 'dot' + (on ? ' on' : '');
  if (txt) txt.textContent = on ? '已连接' : '连接中...';
}

// ═══════════════════════════════════
// MODE ENTRY
// ═══════════════════════════════════
function enterMode(m) {
  // Check if this is an exam mode test
  if (window.HSK_TEST_DATA && window.HSK_TEST_DATA.examMode) {
    enterExamMode(m);
    return;
  }
  mode = m;
  document.getElementById('modeSelect').style.display = 'none';
  if (m === 'teacher') {
    document.getElementById('teacherView').style.display = '';
    // Restore done questions from saved data
    doneQuestions = new Set(Object.keys(allSubmissions).map(Number));
    buildTeacherSidebar();
    // Mark done questions in sidebar
    doneQuestions.forEach(qId => {
      const btn = document.getElementById('tqb_' + qId);
      if (btn) btn.classList.add('done');
    });
  } else {
    document.getElementById('studentView').style.display = '';
    buildStudentNameList();
    if (studentName) restoreStudentName();
    document.getElementById('sScore').textContent = studentScore;
  }
  connectMQTT();
}

function goBack() {
  if (client) client.end();
  mode = null;
  document.getElementById('teacherView').style.display = 'none';
  document.getElementById('studentView').style.display = 'none';
  document.getElementById('modeSelect').style.display = '';
}

// ═══════════════════════════════════
// TEACHER: SIDEBAR
// ═══════════════════════════════════
function buildTeacherSidebar() {
  const sb = document.getElementById('tSidebar');
  const sections = {};
  ALL_QUESTIONS.forEach(q => {
    if (!sections[q.section]) sections[q.section] = {};
    if (!sections[q.section][q.part]) sections[q.section][q.part] = [];
    sections[q.section][q.part].push(q);
  });

  let html = '';
  for (const [sec, parts] of Object.entries(sections)) {
    html += `<div class="t-section-title">${sec}</div>`;
    for (const [part, qs] of Object.entries(parts)) {
      html += `<div class="t-part-title">${part}</div><div class="t-q-list">`;
      qs.forEach(q => {
        html += `<button class="t-q-btn" id="tqb_${q.id}" onclick="teacherSelectQ(${q.id})">${q.id}</button>`;
      });
      html += '</div>';
    }
  }
  sb.innerHTML = html;
}

// ═══════════════════════════════════
// TEACHER: SELECT & PUSH QUESTION
// ═══════════════════════════════════
function teacherSelectQ(qId) {
  currentQId = qId;
  questionPushed = false;
  answerRevealed = false;
  submissions = {};

  // Highlight sidebar button
  document.querySelectorAll('.t-q-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tqb_' + qId);
  if (btn) btn.classList.add('active');

  renderTeacherMain();
}

function renderTeacherMain() {
  const q = Q_MAP[currentQId];
  if (!q) return;
  const main = document.getElementById('tMain');

  const typeLabels = { choice: '选择题', true_false: '判断对错', text_input: '书写题' };
  const answerDisplay = q.type === 'true_false' ? (q.answer ? '√ 对' : '× 错') : q.answer;

  let bodyHtml = '';
  if (q.body) bodyHtml += `<div class="q-body">${escHtml(q.body)}</div>`;
  if (q.statement) bodyHtml += `<div class="q-body">★ ${escHtml(q.statement)}</div>`;

  let optionsHtml = '';
  if (q.type === 'picture_choice' && q.images) {
    optionsHtml = '<div class="t-pic-grid">';
    q.optionKeys.forEach(k => {
      const isCorrect = answerRevealed && k === q.answer;
      optionsHtml += '<div class="t-pic-cell' + (isCorrect ? ' correct' : '') + '"><img src="' + getImage(q,k) + '"><div class="lbl">' + k + (isCorrect ? ' ✅' : '') + '</div></div>';
    });
    optionsHtml += '</div>';
  } else if (q.options) {
    optionsHtml = '<div class="q-options">';
    q.options.forEach((opt, i) => {
      const key = q.optionKeys ? q.optionKeys[i] : String.fromCharCode(65 + i);
      const isCorrect = answerRevealed && key === q.answer;
      optionsHtml += `<div class="q-opt${isCorrect ? ' correct' : ''}">${escHtml(opt)}</div>`;
    });
    optionsHtml += '</div>';
  }

  main.innerHTML = `
    <div class="t-question-card">
      <div class="q-label">第 ${q.id} 题</div>
      <div class="q-type">${q.section} · ${q.part} · ${typeLabels[q.type] || q.type}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">${escHtml(q.instruction || '')}</div>
      ${bodyHtml}
      ${optionsHtml}
      <div class="q-answer" id="tAnswer" style="${answerRevealed ? 'display:block' : ''}">✅ 正确答案：${escHtml(String(answerDisplay))}</div>
    </div>
    <div class="t-actions">
      <button class="t-btn t-btn-push" id="btnPush" onclick="pushQuestion()" ${questionPushed ? 'disabled' : ''}>
        ${questionPushed ? '✅ 已推送' : '📤 推送给学生'}
      </button>
      <button class="t-btn t-btn-reveal" onclick="revealAnswer()" ${!questionPushed || answerRevealed ? 'style="display:none"' : ''}>
        📊 公布答案
      </button>
      <button class="t-btn t-btn-close" onclick="closeQuestion()" ${!questionPushed ? 'style="display:none"' : ''}>
        🔒 关闭此题
      </button>
      <button class="t-btn t-btn-nav" onclick="goNextQ(-1)">← 上一题</button>
      <button class="t-btn t-btn-nav" onclick="goNextQ(1)">下一题 →</button>
      <button class="t-btn" style="background:#7c3aed;color:#fff" onclick="showStats()">📊 成绩统计</button>
    </div>
    <div class="t-dashboard" id="tDashboard">
      <h3>📊 答题情况 <span style="font-weight:400;font-size:12px">(${Object.keys(submissions).length}/${STUDENTS.length} 人已交)</span></h3>
      <div class="t-stats" id="tStats"></div>
      <div class="t-answers-grid" id="tAnswersGrid"></div>
    </div>
  `;
  renderDashboard();
}

function pushQuestion() {
  if (!currentQId || !connected) return;
  questionPushed = true;
  submissions = {};
  const q = Q_MAP[currentQId];
  const payload = {
    id: q.id, section: q.section, part: q.part, type: q.type,
    instruction: q.instruction, body: q.body || null,
    statement: q.statement || null,
    options: q.options || null, optionKeys: q.optionKeys || null
  };
  client.publish(TOPIC_QUESTION, JSON.stringify(payload), { qos: 1, retain: true });
  renderTeacherMain();
}

function revealAnswer() {
  if (!currentQId) return;
  answerRevealed = true;
  const q = Q_MAP[currentQId];
  doneQuestions.add(currentQId);

  // Save all submissions for this question into cumulative record
  allSubmissions[currentQId] = {};
  STUDENTS.forEach(name => {
    const sub = submissions[name];
    if (sub) {
      const correct = checkAnswer(q, sub.answer);
      allSubmissions[currentQId][name] = { answer: sub.answer, correct };
    }
  });
  localStorage.setItem('hsk_sub_' + currentTestId, JSON.stringify(allSubmissions));

  const btn = document.getElementById('tqb_' + currentQId);
  if (btn) btn.classList.add('done');
  client.publish(TOPIC_REVEAL, JSON.stringify({ id: q.id, answer: q.answer }), { qos: 1 });
  renderTeacherMain();
}

function closeQuestion() {
  client.publish(TOPIC_CLOSE, JSON.stringify({ id: currentQId }), { qos: 1 });
  // Clear retained question
  client.publish(TOPIC_QUESTION, '', { qos: 1, retain: true });
}

function goNextQ(dir) {
  if (!currentQId) return;
  const idx = ALL_QUESTIONS.findIndex(q => q.id === currentQId);
  const next = idx + dir;
  if (next >= 0 && next < ALL_QUESTIONS.length) {
    teacherSelectQ(ALL_QUESTIONS[next].id);
  }
}

// ═══════════════════════════════════
// TEACHER: STATS
// ═══════════════════════════════════
function showStats() {
  const doneCount = Object.keys(allSubmissions).length;

  // Calculate per-student, per-section scores
  const sections = { '听力': { ids: [], total: 40 }, '阅读': { ids: [], total: 30 }, '书写': { ids: [], total: 10 } };
  ALL_QUESTIONS.forEach(q => {
    if (sections[q.section]) sections[q.section].ids.push(q.id);
  });

  const studentStats = STUDENTS.map(name => {
    const row = { name, sections: {}, totalCorrect: 0, totalAnswered: 0 };
    for (const [sec, info] of Object.entries(sections)) {
      let correct = 0, answered = 0;
      info.ids.forEach(qId => {
        const sub = allSubmissions[qId] && allSubmissions[qId][name];
        if (sub) {
          answered++;
          if (sub.correct === true) correct++;
        }
      });
      const doneInSec = info.ids.filter(id => allSubmissions[id]).length;
      row.sections[sec] = { correct, answered, doneInSec, total: info.total };
      row.totalCorrect += correct;
      row.totalAnswered += answered;
    }
    return row;
  });

  studentStats.sort((a, b) => b.totalCorrect - a.totalCorrect);

  // Section correct rates (class average)
  const sectionAvg = {};
  for (const [sec, info] of Object.entries(sections)) {
    const doneIds = info.ids.filter(id => allSubmissions[id]);
    let totalCorrect = 0, totalAttempts = 0;
    doneIds.forEach(qId => {
      STUDENTS.forEach(name => {
        const sub = allSubmissions[qId] && allSubmissions[qId][name];
        if (sub) {
          totalAttempts++;
          if (sub.correct === true) totalCorrect++;
        }
      });
    });
    sectionAvg[sec] = { done: doneIds.length, total: info.total, rate: totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0 };
  }

  // Build HTML
  let html = `<div class="stats-overlay" onclick="if(event.target===this)closeStats()">
    <div class="stats-panel">
      <button class="stats-close" onclick="closeStats()">✕</button>
      <h2>📊 成绩统计</h2>
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px">已完成 ${doneCount}/80 题
        <button onclick="if(confirm('确定清除所有统计数据吗？')){localStorage.removeItem('hsk_sub_' + currentTestId);allSubmissions={};doneQuestions.clear();closeStats();buildTeacherSidebar();}" style="margin-left:12px;font-size:11px;color:var(--red);border:1px solid var(--red);background:none;padding:2px 8px;border-radius:4px;cursor:pointer">🗑️ 清除数据</button>
      </div>

      <div class="stats-summary">`;

  for (const [sec, avg] of Object.entries(sectionAvg)) {
    html += `<div class="card"><div class="num">${avg.rate}%</div><div class="label">${sec}（已做${avg.done}/${avg.total}题）</div></div>`;
  }
  const overallAttempts = studentStats.reduce((s, r) => s + r.totalAnswered, 0);
  const overallCorrect = studentStats.reduce((s, r) => s + r.totalCorrect, 0);
  const overallRate = overallAttempts > 0 ? Math.round(overallCorrect / overallAttempts * 100) : 0;
  html += `<div class="card"><div class="num">${overallRate}%</div><div class="label">全班平均正确率</div></div>`;
  html += `</div>

      <div style="overflow-x:auto">
      <table class="stats-table">
        <tr>
          <th rowspan="2">排名</th>
          <th rowspan="2">姓名</th>
          <th colspan="2">听力</th>
          <th colspan="2">阅读</th>
          <th colspan="2">书写</th>
          <th rowspan="2" class="highlight">总分</th>
          <th rowspan="2">正确率</th>
        </tr>
        <tr>
          <th>得分</th><th>/已做</th>
          <th>得分</th><th>/已做</th>
          <th>得分</th><th>/已做</th>
        </tr>`;

  studentStats.forEach((s, i) => {
    const rate = s.totalAnswered > 0 ? Math.round(s.totalCorrect / s.totalAnswered * 100) : 0;
    html += `<tr>
      <td>${i + 1}</td>
      <td class="name-col">${shortName(s.name)}</td>`;
    for (const sec of ['听力', '阅读', '书写']) {
      const d = s.sections[sec];
      html += `<td>${d.correct}</td><td style="color:var(--text2);font-size:11px">${d.doneInSec}</td>`;
    }
    html += `<td class="highlight">${s.totalCorrect}</td>
      <td>${rate}%</td>
    </tr>`;
  });

  html += `</table></div></div></div>`;

  // Remove existing overlay if any
  closeStats();
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeStats() {
  const overlay = document.querySelector('.stats-overlay');
  if (overlay) overlay.remove();
}

// ═══════════════════════════════════
// TEACHER: RECEIVE SUBMISSIONS
// ═══════════════════════════════════
function onTeacherReceiveSubmission(data) {
  if (data.questionId !== currentQId) return;
  submissions[data.name] = { answer: data.answer, time: data.time };
  renderDashboard();
}

function renderDashboard() {
  const grid = document.getElementById('tAnswersGrid');
  const stats = document.getElementById('tStats');
  if (!grid || !stats) return;

  const q = Q_MAP[currentQId];
  let correctCount = 0, wrongCount = 0;

  let gridHtml = '';
  STUDENTS.forEach(name => {
    const sub = submissions[name];
    if (!sub) {
      gridHtml += `<div class="t-answer-cell"><span class="name">${shortName(name)}</span><span class="ans" style="color:#ccc">—</span></div>`;
    } else {
      let cls = '';
      if (answerRevealed) {
        const isCorrect = checkAnswer(q, sub.answer);
        cls = isCorrect ? 'c' : 'w';
        if (isCorrect) correctCount++; else wrongCount++;
      } else {
        cls = 'pending';
      }
      gridHtml += `<div class="t-answer-cell ${cls}"><span class="name">${shortName(name)}</span><span class="ans">${escHtml(String(sub.answer))}</span></div>`;
    }
  });

  const total = Object.keys(submissions).length;
  let statsHtml = `<span class="t-stat total">已交 ${total}/${STUDENTS.length}</span>`;
  if (answerRevealed) {
    statsHtml += `<span class="t-stat correct">✅ ${correctCount}</span>`;
    statsHtml += `<span class="t-stat wrong">❌ ${wrongCount}</span>`;
    const pct = total > 0 ? Math.round(correctCount / total * 100) : 0;
    statsHtml += `<span class="t-stat total">正确率 ${pct}%</span>`;
  }

  stats.innerHTML = statsHtml;
  grid.innerHTML = gridHtml;
  // Update header count
  const h3 = document.querySelector('#tDashboard h3');
  if (h3) h3.innerHTML = `📊 答题情况 <span style="font-weight:400;font-size:12px">(${total}/${STUDENTS.length} 人已交)</span>`;
}

// STUDENT: NAME
// ═══════════════════════════════════
function buildStudentNameList() {
  const sel = document.getElementById('sNameSelect');
  STUDENTS.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function confirmStudentName() {
  const val = document.getElementById('sNameSelect').value;
  if (!val) return;
  studentName = val;
  localStorage.setItem('hsk_student_name', val);
  document.getElementById('sNameSelectArea').style.display = 'none';
  document.getElementById('sNameConfirmed').style.display = '';
  document.getElementById('sConfirmedName').textContent = val;
}

function restoreStudentName() {
  document.getElementById('sNameSelect').value = studentName;
  confirmStudentName();
}

function changeStudentName() {
  studentName = '';
  localStorage.removeItem('hsk_student_name');
  document.getElementById('sNameSelectArea').style.display = '';
  document.getElementById('sNameConfirmed').style.display = 'none';
}

// ═══════════════════════════════════
// STUDENT: RECEIVE QUESTION
// ═══════════════════════════════════
function onStudentReceiveQuestion(data) {
  if (!data || !data.id) return;
  // Force full state reset
  activeQuestion = data;
  myAnswer = null;
  answerLocked = false;
  // Clear DOM first to ensure fresh render
  const area = document.getElementById('sQuestionArea');
  if (area) area.innerHTML = '';
  renderStudentQuestion();
}

function onStudentReceiveReveal(data) {
  if (!activeQuestion || data.id !== activeQuestion.id) return;
  answerLocked = true;
  const q = Q_MAP[data.id];
  const isCorrect = myAnswer !== null && checkAnswer(q, myAnswer);

  // Save result
  if (myAnswer !== null) {
    if (isCorrect) {
      studentScore++;
      localStorage.setItem('hsk_score_' + currentTestId, studentScore);
      document.getElementById('sScore').textContent = studentScore;
    }
    studentDone[data.id] = { answer: myAnswer, correct: isCorrect };
    localStorage.setItem('hsk_student_done', JSON.stringify(studentDone));
  }

  renderStudentReveal(data.answer, isCorrect);
}

function onStudentReceiveClose(data) {
  activeQuestion = null;
  myAnswer = null;
  answerLocked = false;
  document.getElementById('sQuestionArea').innerHTML = `
    <div class="s-waiting">
      <div class="icon pulse">📡</div>
      <p>等待老师出题...</p>
      <p style="margin-top:16px"><a href="#" onclick="refreshQuestion();return false" style="font-size:13px;color:var(--accent)">收不到题目？点击刷新</a></p>
    </div>`;
}

// ═══════════════════════════════════
// STUDENT: RENDER QUESTION
// ═══════════════════════════════════
function renderStudentQuestion() {
  const q = activeQuestion;
  if (!q) return;
  const area = document.getElementById('sQuestionArea');

  let bodyHtml = '';
  if (q.body) bodyHtml = `<div class="q-body">${escHtml(q.body)}</div>`;
  if (q.statement) bodyHtml = `<div class="q-body">★ ${escHtml(q.statement)}</div>`;

  let inputHtml = '';

  if (q.type === 'picture_choice') {
    const qData = Q_MAP[q.id];
    if (qData && qData.images) {
      inputHtml = '<div class="s-pic-grid">';
      q.optionKeys.forEach(k => {
        inputHtml += `<button class="s-pic-btn" id="sopt_${k}" onclick="studentSelectOption('${k}')" ${answerLocked ? 'disabled' : ''}>
          <span class="pic-label">${k}</span><img src="${getImage(qData,k)}">
        </button>`;
      });
      inputHtml += '</div>';
    }
  } else if (q.type === 'choice') {
    inputHtml = '<div class="s-options">';
    q.options.forEach((opt, i) => {
      const key = q.optionKeys ? q.optionKeys[i] : String.fromCharCode(65 + i);
      inputHtml += `<button class="s-opt-btn" id="sopt_${key}" onclick="studentSelectOption('${key}')" ${answerLocked ? 'disabled' : ''}>
        <span class="letter">${key}</span><span>${escHtml(opt.replace(/^[A-F]\.\s*/, ''))}</span>
      </button>`;
    });
    inputHtml += '</div>';
  } else if (q.type === 'true_false') {
    inputHtml = `<div class="s-tf-btns">
      <button class="s-tf-btn" id="sopt_true" onclick="studentSelectTF(true)" ${answerLocked ? 'disabled' : ''}>✓ 对</button>
      <button class="s-tf-btn" id="sopt_false" onclick="studentSelectTF(false)" ${answerLocked ? 'disabled' : ''}>✗ 错</button>
    </div>`;
  } else if (q.type === 'text_input') {
    inputHtml = `<input class="s-text-input" id="sTextInput" placeholder="输入你的答案..." ${answerLocked ? 'disabled' : ''}>
      <button class="s-submit-btn" id="sSubmitText" onclick="studentSubmitText()" ${answerLocked ? 'disabled' : ''}>提交</button>`;
  }

  area.innerHTML = `
    <div class="s-question">
      <div class="q-num">第 ${q.id} 题 · ${q.section} ${q.part}</div>
      <div class="q-instruction">${escHtml(q.instruction || '')}</div>
      ${bodyHtml}
      ${inputHtml}
      <div id="sResult"></div>
    </div>`;
}

function studentSelectOption(key) {
  if (answerLocked || !studentName) return;
  myAnswer = key;
  document.querySelectorAll('.s-opt-btn,.s-pic-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('sopt_' + key);
  if (btn) btn.classList.add('selected');
  submitStudentAnswer(key);
}

function studentSelectTF(val) {
  if (answerLocked || !studentName) return;
  myAnswer = val;
  document.querySelectorAll('.s-tf-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('sopt_' + val);
  if (btn) btn.classList.add('selected');
  submitStudentAnswer(val);
}

function studentSubmitText() {
  if (answerLocked || !studentName) return;
  const input = document.getElementById('sTextInput');
  if (!input || !input.value.trim()) return;
  myAnswer = input.value.trim();
  input.disabled = true;
  document.getElementById('sSubmitText').disabled = true;
  submitStudentAnswer(myAnswer);
}

function submitStudentAnswer(answer) {
  if (!connected || !activeQuestion) return;
  client.publish(TOPIC_SUBMIT, JSON.stringify({
    name: studentName,
    questionId: activeQuestion.id,
    answer: answer,
    time: new Date().toISOString()
  }), { qos: 1 });
}

function refreshQuestion() {
  if (!client || !connected) {
    // Force reconnect
    if (client) client.end(true);
    connectMQTT();
    return;
  }
  // Re-subscribe to trigger retained message delivery
  client.unsubscribe(TOPIC_QUESTION, () => {
    client.subscribe(TOPIC_QUESTION, { qos: 1 });
  });
}

// ═══════════════════════════════════
// STUDENT: REVEAL RESULT
// ═══════════════════════════════════
function renderStudentReveal(correctAnswer, isCorrect) {
  const q = activeQuestion;
  if (!q) return;

  // Highlight correct/wrong options
  if (q.type === 'picture_choice') {
    document.querySelectorAll('.s-pic-btn').forEach(b => {
      b.disabled = true;
      const key = b.id.replace('sopt_', '');
      if (key === correctAnswer) b.classList.add('correct-reveal');
      else if (key === myAnswer && key !== correctAnswer) b.classList.add('wrong-reveal');
    });
  } else if (q.type === 'choice') {
    document.querySelectorAll('.s-opt-btn').forEach(b => {
      b.disabled = true;
      const key = b.id.replace('sopt_', '');
      if (key === correctAnswer) b.classList.add('correct-reveal');
      else if (key === myAnswer && key !== correctAnswer) b.classList.add('wrong-reveal');
    });
  } else if (q.type === 'true_false') {
    document.querySelectorAll('.s-tf-btn').forEach(b => {
      b.disabled = true;
      const val = b.id === 'sopt_true';
      if (val === correctAnswer) b.classList.add('correct-reveal');
      else if (val === myAnswer && val !== correctAnswer) b.classList.add('wrong-reveal');
    });
  }

  // Show result
  const res = document.getElementById('sResult');
  if (res && myAnswer !== null) {
    res.className = 's-result ' + (isCorrect ? 'correct' : 'wrong');
    if (isCorrect) {
      res.textContent = '✅ 回答正确！+1分';
    } else {
      const display = q.type === 'true_false' ? (correctAnswer ? '✓ 对' : '✗ 错') : correctAnswer;
      res.textContent = '❌ 正确答案：' + display;
    }
  } else if (res) {
    res.className = 's-result wrong';
    res.textContent = '⏰ 未作答';
  }
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function checkAnswer(q, answer) {
  if (!q) return false;
  if (q.type === 'true_false') return answer === q.answer;
  if (q.gradeMode === 'auto_char') return String(answer).trim() === String(q.answer).trim();
  if (q.gradeMode === 'manual') return null; // teacher grades
  return String(answer).toUpperCase().trim() === String(q.answer).toUpperCase().trim();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/\n/g, '<br>');
}

function shortName(name) {
  // Show first part before space, or first 6 chars
  const parts = name.split(' ');
  return parts[0].length > 8 ? parts[0].substring(0, 6) + '..' : parts[0];
}

// ═══════════════════════════════════
// URL PARAM AUTO-MODE
// ═══════════════════════════════════
(function() {
  const params = new URLSearchParams(window.location.search);
  const testId = params.get('test');
  if (testId) {
    const script = document.createElement('script');
    script.src = 'data_' + testId + '.js';
    script.onload = function() {
      if (loadTestData()) {
        const m = params.get('mode');
        if (m === 'teacher' || m === 'student') enterMode(m);
      }
    };
    script.onerror = function() {
      document.querySelector('.mode-select p').textContent = '找不到试卷 ' + testId;
      document.querySelectorAll('.mode-btn').forEach(b => b.style.display='');
    };
    document.head.appendChild(script);
  } else {
    const sel = document.getElementById('modeSelect');
    sel.querySelector('p').innerHTML = '请选择试卷';

// ═══════════════ EXAM MODE (模拟考试) ═══════════════════════════
// ═══════════════════════════════════════════════════════════════
let examPhase = 'idle';         // idle | listening | reading | writing | finished
let examTimer = null;
let examTimerEnd = 0;
let studentAnswers = {};        // {qId: answer}
let allStudentSubmissions = {}; // {name: {qId: answer, ...}}  (teacher side)
let resultsReleased = false;

const EXAM_TOPIC_PHASE  = `classpro/room/${ROOM}/hsk/${_T}/exam/phase`;
const EXAM_TOPIC_SUBMIT = `classpro/room/${ROOM}/hsk/${_T}/exam/submit`;
const EXAM_TOPIC_RESULT = `classpro/room/${ROOM}/hsk/${_T}/exam/result`;

function enterExamMode(m) {
  if (m === 'teacher') {
    const pwd = prompt('请输入教师密码：');
    if (pwd !== '8888') return;
  }
  mode = m;
  document.getElementById('modeSelect').style.display = 'none';
  document.getElementById('teacherView').style.display = 'none';
  document.getElementById('studentView').style.display = 'none';

  // Build exam UI container
  if (!document.getElementById('examView')) {
    const div = document.createElement('div');
    div.id = 'examView';
    document.body.appendChild(div);
  }
  document.getElementById('examView').style.display = '';

  // Restore saved state
  if (m === 'teacher') {
    allStudentSubmissions = JSON.parse(localStorage.getItem('hsk_exam_subs_' + currentTestId) || '{}');
    examPhase = localStorage.getItem('hsk_exam_phase_' + currentTestId) || 'idle';
    resultsReleased = localStorage.getItem('hsk_exam_released_' + currentTestId) === '1';
    renderTeacherExam();
  } else {
    studentAnswers = JSON.parse(localStorage.getItem('hsk_exam_ans_' + currentTestId) || '{}');
    examPhase = localStorage.getItem('hsk_exam_studentphase_' + currentTestId) || 'idle';
    buildStudentNameList();
    if (studentName) restoreStudentName();
    renderStudentExam();
  }
  connectExamMQTT();
}

function connectExamMQTT() {
  client = mqtt.connect(MQTT_URL, {
    username: MQTT_USER, password: MQTT_PASS,
    clientId: 'hskexam_' + mode + '_' + Math.random().toString(36).substr(2,6),
    reconnectPeriod: 3000, clean: true
  });
  client.on('connect', () => {
    connected = true;
    if (mode === 'teacher') {
      client.subscribe(EXAM_TOPIC_SUBMIT, {qos:1});
    } else {
      client.subscribe(EXAM_TOPIC_PHASE, {qos:1});
      client.subscribe(EXAM_TOPIC_RESULT, {qos:1});
    }
  });
  client.on('message', (topic, payload) => {
    let data; try { data = JSON.parse(payload.toString()); } catch(e) { return; }
    if (mode === 'teacher' && topic === EXAM_TOPIC_SUBMIT) {
      if (!allStudentSubmissions[data.name]) allStudentSubmissions[data.name] = {};
      Object.assign(allStudentSubmissions[data.name], data.answers);
      localStorage.setItem('hsk_exam_subs_' + currentTestId, JSON.stringify(allStudentSubmissions));
      renderTeacherExam();
    }
    if (mode === 'student') {
      if (topic === EXAM_TOPIC_PHASE) onStudentReceivePhase(data);
      if (topic === EXAM_TOPIC_RESULT) onStudentReceiveResult(data);
    }
  });
  client.on('offline', () => connected = false);
}

// ─── TEACHER EXAM VIEW ───
function renderTeacherExam() {
  const view = document.getElementById('examView');
  const studentCount = Object.keys(allStudentSubmissions).length;

  // Aggregate stats
  const sections = {'听力':{ids:[],total:40},'阅读':{ids:[],total:30},'书写':{ids:[],total:10}};
  ALL_QUESTIONS.forEach(q => { if(sections[q.section]) sections[q.section].ids.push(q.id); });

  const studentStats = STUDENTS.map(name => {
    const subs = allStudentSubmissions[name] || {};
    const row = {name, sections:{}, totalCorrect:0, totalAnswered:0};
    for (const [sec, info] of Object.entries(sections)) {
      let c=0, a=0;
      info.ids.forEach(qId => {
        if (subs[qId] !== undefined && subs[qId] !== null && subs[qId] !== '') {
          a++;
          const q = Q_MAP[qId];
          if (checkAnswer(q, subs[qId]) === true) c++;
        }
      });
      row.sections[sec] = {correct:c, answered:a, total:info.total};
      row.totalCorrect += c;
      row.totalAnswered += a;
    }
    return row;
  });
  studentStats.sort((a,b) => b.totalCorrect - a.totalCorrect);

  const phaseLabels = {
    idle:'未开始',
    listening:'听力进行中',
    reading:'阅读进行中',
    writing:'书写进行中',
    finished:'考试结束'
  };

  let html = `
    <div class="header">
      <button class="back-btn" onclick="examGoBack()">← 返回</button>
      <h1>HSK 模拟考试 · 教师端</h1>
      <div class="status"><span class="dot ${connected?'on':''}"></span>${phaseLabels[examPhase]||examPhase}</div>
    </div>
    <div style="padding:20px;max-width:1200px;margin:0 auto">

      <div style="background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:16px">
        <h2 style="font-size:18px;margin-bottom:14px">📋 考试控制台</h2>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
          <button class="t-btn t-btn-push" onclick="startPhase('listening')" ${examPhase!=='idle' && examPhase!=='listening' ? 'disabled' : ''}>
            ${examPhase==='listening' ? '🎧 听力中（点击结束）' : '🎧 开始听力'}
          </button>
          <button class="t-btn t-btn-push" style="background:#2563eb" onclick="startPhase('reading')" ${examPhase==='listening' || examPhase==='writing' || examPhase==='finished' ? 'disabled' : ''}>
            ${examPhase==='reading' ? '📖 阅读中（剩余 '+timerDisplay()+'）' : '📖 开始阅读（30分钟）'}
          </button>
          <button class="t-btn t-btn-push" style="background:#7c3aed" onclick="startPhase('writing')" ${examPhase!=='reading' && examPhase!=='writing' ? 'disabled' : ''}>
            ${examPhase==='writing' ? '✍️ 书写中（剩余 '+timerDisplay()+'）' : '✍️ 开始书写（15分钟）'}
          </button>
          <button class="t-btn" style="background:#dc2626;color:#fff" onclick="endExam()" ${examPhase==='idle' || examPhase==='finished' ? 'disabled' : ''}>
            🏁 结束考试
          </button>
          <button class="t-btn" style="background:#059669;color:#fff" onclick="releaseResults()" ${examPhase!=='finished' || resultsReleased ? 'disabled' : ''}>
            ${resultsReleased ? '✅ 已公布成绩' : '📢 公布成绩给学生'}
          </button>
          <button class="t-btn" style="background:#6b7280;color:#fff;margin-left:auto" onclick="resetExam()">
            🗑️ 重置考试
          </button>
        </div>
        <div style="font-size:13px;color:var(--text2)">
          已交卷学生：${studentCount}/${STUDENTS.length} 人　|　当前阶段：${phaseLabels[examPhase]||examPhase}
        </div>
      </div>

      <div style="background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);overflow-x:auto">
        <h2 style="font-size:18px;margin-bottom:14px">📊 实时成绩</h2>
        <table class="stats-table" style="min-width:700px">
          <tr>
            <th rowspan="2">排名</th><th rowspan="2">姓名</th>
            <th colspan="2">听力(/40)</th><th colspan="2">阅读(/30)</th><th colspan="2">书写(/10)</th>
            <th rowspan="2" class="highlight">总分(/80)</th><th rowspan="2">正确率</th>
          </tr>
          <tr><th>得分</th><th>已答</th><th>得分</th><th>已答</th><th>得分</th><th>已答</th></tr>`;

  studentStats.forEach((s,i) => {
    const rate = s.totalAnswered>0 ? Math.round(s.totalCorrect/s.totalAnswered*100) : 0;
    const hasData = s.totalAnswered > 0;
    html += `<tr style="${hasData?'':'color:#ccc'}">
      <td>${i+1}</td><td class="name-col">${shortName(s.name)}</td>`;
    for (const sec of ['听力','阅读','书写']) {
      const d = s.sections[sec];
      html += `<td><b>${d.correct}</b></td><td style="color:var(--text2);font-size:11px">${d.answered}</td>`;
    }
    html += `<td class="highlight">${s.totalCorrect}</td><td>${rate}%</td></tr>`;
  });
  html += `</table></div></div>`;

  view.innerHTML = html;
}

function startPhase(phase) {
  if (phase === 'listening' && examPhase === 'listening') {
    // End listening
    examPhase = 'idle';
    publishPhase();
    saveExamState();
    renderTeacherExam();
    return;
  }
  if (phase === 'reading' && examPhase === 'reading') return;
  if (phase === 'writing' && examPhase === 'writing') return;

  examPhase = phase;
  if (phase === 'reading') {
    examTimerEnd = Date.now() + 30 * 60 * 1000;
  } else if (phase === 'writing') {
    examTimerEnd = Date.now() + 15 * 60 * 1000;
  } else {
    examTimerEnd = 0;
  }
  publishPhase();
  saveExamState();
  startTickTimer();
  renderTeacherExam();
}

function endExam() {
  examPhase = 'finished';
  examTimerEnd = 0;
  publishPhase();
  saveExamState();
  renderTeacherExam();
}

function releaseResults() {
  resultsReleased = true;
  localStorage.setItem('hsk_exam_released_' + currentTestId, '1');
  // Compute results for each student and broadcast
  ALL_QUESTIONS.forEach(q => {});
  const allResults = {};
  STUDENTS.forEach(name => {
    const subs = allStudentSubmissions[name] || {};
    const result = {sections:{}, totalCorrect:0, answers:{}, correct:{}};
    ['听力','阅读','书写'].forEach(sec => {
      let c=0, a=0;
      ALL_QUESTIONS.filter(q => q.section === sec).forEach(q => {
        const ans = subs[q.id];
        result.answers[q.id] = ans !== undefined ? ans : null;
        const isCorrect = ans !== undefined && checkAnswer(q, ans) === true;
        result.correct[q.id] = isCorrect;
        if (ans !== undefined) a++;
        if (isCorrect) c++;
      });
      result.sections[sec] = {correct:c, answered:a};
      result.totalCorrect += c;
    });
    allResults[name] = result;
  });
  client.publish(EXAM_TOPIC_RESULT, JSON.stringify(allResults), {qos:1, retain:true});
  renderTeacherExam();
}

function resetExam() {
  if (!confirm('确定重置整场考试吗？所有学生答题记录将被清除。')) return;
  allStudentSubmissions = {};
  examPhase = 'idle';
  examTimerEnd = 0;
  resultsReleased = false;
  localStorage.removeItem('hsk_exam_subs_' + currentTestId);
  localStorage.removeItem('hsk_exam_phase_' + currentTestId);
  localStorage.removeItem('hsk_exam_released_' + currentTestId);
  client.publish(EXAM_TOPIC_PHASE, JSON.stringify({phase:'idle',timerEnd:0,reset:true}), {qos:1, retain:true});
  client.publish(EXAM_TOPIC_RESULT, '', {qos:1, retain:true});
  renderTeacherExam();
}

function publishPhase() {
  client.publish(EXAM_TOPIC_PHASE, JSON.stringify({phase:examPhase, timerEnd:examTimerEnd}), {qos:1, retain:true});
}

function saveExamState() {
  localStorage.setItem('hsk_exam_phase_' + currentTestId, examPhase);
}

let _tickInterval = null;
function startTickTimer() {
  if (_tickInterval) clearInterval(_tickInterval);
  _tickInterval = setInterval(() => {
    if (examTimerEnd > 0 && Date.now() >= examTimerEnd) {
      // Auto-advance
      if (examPhase === 'reading') {
        examPhase = 'idle';
        examTimerEnd = 0;
        publishPhase();
        saveExamState();
      } else if (examPhase === 'writing') {
        endExam();
      }
    }
    if (mode === 'teacher') renderTeacherExam();
    else if (mode === 'student') updateStudentTimer();
  }, 1000);
}

function timerDisplay() {
  if (examTimerEnd === 0) return '--:--';
  const ms = examTimerEnd - Date.now();
  if (ms <= 0) return '00:00';
  const s = Math.floor(ms/1000);
  return Math.floor(s/60).toString().padStart(2,'0') + ':' + (s%60).toString().padStart(2,'0');
}

// ─── STUDENT EXAM VIEW ───
function onStudentReceivePhase(data) {
  examPhase = data.phase;
  examTimerEnd = data.timerEnd || 0;
  if (data.reset) {
    studentAnswers = {};
    localStorage.removeItem('hsk_exam_ans_' + currentTestId);
  }
  localStorage.setItem('hsk_exam_studentphase_' + currentTestId, examPhase);
  if (examTimerEnd > 0) startTickTimer();
  renderStudentExam();
}

function onStudentReceiveResult(data) {
  if (!data || !studentName) return;
  const myResult = data[studentName];
  if (myResult) {
    window._myExamResult = myResult;
    renderStudentExam();
  }
}

function renderStudentExam() {
  const view = document.getElementById('examView');

    <button class="back-btn" onclick="examGoBack()">←</button>
    <h1>HSK 模拟考试</h1>

      <select class="s-name-select" id="sNameSelect" onchange="confirmStudentName();renderStudentExam()">

      </select></div></div>`;

  }
  html += `<div class="s-name-section"><div class="s-name-confirmed"><span class="name">👤 ${studentName}</span>

  // Results phase
  if (window._myExamResult) {
    const r = window._myExamResult;
    html += `<div style="background:var(--card);border-radius:12px;padding:24px;border:1px solid var(--border);text-align:center;margin-bottom:16px">
      <h2 style="font-size:22px;color:var(--accent);margin-bottom:16px">🎉 我的成绩</h2>
      <div style="font-size:48px;font-weight:700;color:var(--accent);margin-bottom:8px">${r.totalCorrect}<span style="font-size:20px;color:var(--text2)">/80</span></div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:20px">总得分</div>
      <div style="display:flex;justify-content:space-around;border-top:1px solid var(--border);padding-top:16px">
        <div><div style="font-size:24px;font-weight:700;color:var(--accent)">${r.sections['听力'].correct}/40</div><div style="font-size:12px;color:var(--text2)">听力</div></div>
        <div><div style="font-size:24px;font-weight:700;color:#2563eb">${r.sections['阅读'].correct}/30</div><div style="font-size:12px;color:var(--text2)">阅读</div></div>
        <div><div style="font-size:24px;font-weight:700;color:#7c3aed">${r.sections['书写'].correct}/10</div><div style="font-size:12px;color:var(--text2)">书写</div></div>
      </div>
    </div>`;
    // Wrong questions list
    const wrongs = ALL_QUESTIONS.filter(q => r.correct[q.id] === false && r.answers[q.id] !== null);
    if (wrongs.length > 0) {
      html += `<div style="background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:16px">
        <h3 style="font-size:16px;margin-bottom:12px">❌ 错题（${wrongs.length}题）</h3>`;
      wrongs.forEach(q => {
        const myAns = r.answers[q.id];
        const correctDisplay = q.type === 'true_false' ? (q.answer ? '✓ 对' : '✗ 错') : q.answer;
        const myDisplay = q.type === 'true_false' ? (myAns === true ? '✓ 对' : myAns === false ? '✗ 错' : myAns) : myAns;
        html += `<div style="padding:10px 0;border-top:1px solid var(--border);font-size:14px">
          <div style="font-weight:600;margin-bottom:4px">第${q.id}题 · ${q.section}${q.part}</div>
          <div style="color:var(--red);font-size:13px">你的答案：${myDisplay}</div>
          <div style="color:var(--green);font-size:13px">正确答案：${correctDisplay}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
    view.innerHTML = html;
    return;
  }

  // Phase-based rendering
  if (examPhase === 'idle' || !examPhase) {
    html += `<div class="s-waiting"><div class="icon pulse">📡</div><p>等待老师开始考试...</p></div>`;
  } else if (examPhase === 'finished') {
    html += `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:16px">📝</div>
      <p style="font-size:16px;margin-bottom:8px">考试已结束</p>
      <p style="font-size:13px;color:var(--text2)">等待老师公布成绩...</p>
    </div>`;
  } else {
    // Active phase
    const sectionName = {listening:'听力',reading:'阅读',writing:'书写'}[examPhase];
    const phaseQs = ALL_QUESTIONS.filter(q => q.section === sectionName);
    const allowChange = examPhase !== 'listening';

    html += `<div style="background:var(--accent-light);border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:14px">

    </div>`;

    phaseQs.forEach(q => {
      const myAns = studentAnswers[q.id];
      const locked = !allowChange && myAns !== undefined;
      html += `<div style="background:var(--card);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid var(--border)">

      if (q.body) html += `<div style="font-size:15px;line-height:1.6;margin-bottom:10px;white-space:pre-line">${escHtml(q.body)}</div>`;
      if (q.statement) html += `<div style="font-size:15px;line-height:1.6;margin-bottom:10px">★ ${escHtml(q.statement)}</div>`;

        html += `<div class="s-pic-grid">`;
        q.optionKeys.forEach(k => {
          const sel = myAns === k;
          html += `<button class="s-pic-btn${sel?' selected':''}" onclick="examSelectAnswer(${q.id},'${k}')" ${locked?'disabled':''}>
            <span class="pic-label">${k}</span><img src="${getImage(q,k)}">
          </button>`;
        });
        html += `</div>`;
      } else if (q.type === 'choice') {
        html += `<div class="s-options">`;
        q.options.forEach((opt,i) => {
          const key = q.optionKeys ? q.optionKeys[i] : String.fromCharCode(65+i);
          const sel = myAns === key;
          html += `<button class="s-opt-btn${sel?' selected':''}" onclick="examSelectAnswer(${q.id},'${key}')" ${locked?'disabled':''}>
            <span class="letter">${key}</span><span>${escHtml(opt.replace(/^[A-F]\.\s*/,''))}</span>
          </button>`;
        });
        html += `</div>`;
      } else if (q.type === 'true_false') {
        html += `<div class="s-tf-btns">
          <button class="s-tf-btn${myAns===true?' selected':''}" onclick="examSelectAnswer(${q.id},true)" ${locked?'disabled':''}>✓ 对</button>
          <button class="s-tf-btn${myAns===false?' selected':''}" onclick="examSelectAnswer(${q.id},false)" ${locked?'disabled':''}>✗ 错</button>
        </div>`;
      } else if (q.type === 'text_input') {
        html += `<input class="s-text-input" placeholder="输入你的答案..." value="${escHtml(myAns||'')}" oninput="examTextInput(${q.id}, this.value)">`;
      }
      html += `</div>`;
    });

    // Submit button for current phase
    html += `<button class="s-submit-btn" onclick="examSubmitPhase()" style="margin-top:8px">提交${sectionName}部分答案</button>`;
  }
  html += `</div>`;
  view.innerHTML = html;
}

function examSelectAnswer(qId, ans) {
  studentAnswers[qId] = ans;
  localStorage.setItem('hsk_exam_ans_' + currentTestId, JSON.stringify(studentAnswers));
  // Update button state without full re-render for snappy UX
  const btn = event.currentTarget;
  const parent = btn.parentElement;
  parent.querySelectorAll('.s-opt-btn,.s-pic-btn,.s-tf-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  // For listening, immediately auto-submit (since locked after)
  if (examPhase === 'listening') {
    examAutoSubmit();
  }
}

function examTextInput(qId, val) {
  studentAnswers[qId] = val;
  localStorage.setItem('hsk_exam_ans_' + currentTestId, JSON.stringify(studentAnswers));
}

function examAutoSubmit() {
  // Debounced submit
  clearTimeout(window._submitDebounce);
  window._submitDebounce = setTimeout(examSubmitPhase, 800);
}

function examSubmitPhase() {
  if (!connected || !studentName) return;
  client.publish(EXAM_TOPIC_SUBMIT, JSON.stringify({
    name: studentName,
    answers: studentAnswers,
    time: new Date().toISOString()
  }), {qos:1});
}

function updateStudentTimer() {
  const el = document.getElementById('examTimerInline');
  if (el) el.textContent = timerDisplay();
}

function examGoBack() {
  if (client) client.end();
  if (_tickInterval) clearInterval(_tickInterval);
  document.getElementById('examView').style.display = 'none';
  document.getElementById('modeSelect').style.display = '';
  mode = null;
}

// Auto-start timer if needed on load
if (window.HSK_TEST_DATA && window.HSK_TEST_DATA.examMode) {
  setTimeout(() => { if (examTimerEnd > 0) startTickTimer(); }, 1000);
}


</script>
